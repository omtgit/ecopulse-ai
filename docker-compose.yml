version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecopulse-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ecopulse
      POSTGRES_PASSWORD: ecopulse_dev
      POSTGRES_DB: ecopulse_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecopulse -d ecopulse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
